const $=s=>document.querySelector(s);
const fmt=n=>"$"+Math.abs(Math.round(n)).toLocaleString();
const fmtS=n=>(n>=0?"+":"-")+fmt(n);
const cc=v=>v>=FLOOR?"#10b981":v>=0?"#f59e0b":"#ef4444";

function sbuf(a){return a>=50000?80000:a>=20000?36000:a>=5000?20000:a>=1000?10000:FLOOR;}
function gadv(a){
  if(a>=50000)return{tier:"Major purchase",color:"#ef4444",icon:"🏆",tip:"Keep $80k+ after — 6 months of expenses."};
  if(a>=20000)return{tier:"Large purchase",color:"#f97316",icon:"💎",tip:"Keep $36k+ after — 3 months of expenses."};
  if(a>=5000)return{tier:"Significant",color:"#f59e0b",icon:"⭐",tip:"Keep $20k+ after — ~1.5 months of expenses."};
  if(a>=1000)return{tier:"Moderate",color:"#06b6d4",icon:"✅",tip:"Keep $10k+ after."};
  return{tier:"Small",color:"#10b981",icon:"👍",tip:"Just keep the $3k floor."};
}

function gInc(idx){return S.inc.filter(i=>{if(i.likely&&!S.jb)return false;return idx>=(i.from||0)&&(i.to==null||idx<=i.to);});}
function gExp(idx){return S.exp.filter(e=>idx>=(e.from||0)&&(e.to==null||idx<=e.to));}

let _R=null,_rk='';
function calc(){
  const key=JSON.stringify([S.jb,S.fa,S.exp.map(e=>[e.id,e.amount,e.from,e.to]),S.inc.map(i=>[i.id,i.amount]),S.cpfOA,S.cpfSA,S.cpfMA,S.gold,S.elec,S.jp,S.jm,S.js,S.jsm,S.goals.map(g=>[g.id,g.amount,g.monthIdx]),JSON.stringify(S.ov)]);
  if(key===_rk)return _R;
  let cash=(S.ov[0]!==undefined)?Number(S.ov[0]):500;
  let oa=S.cpfOA,sa=S.cpfSA,ma=S.cpfMA;
  _R=[];
  MO.forEach((mo,idx)=>{
    if(idx>0&&S.ov[idx]!==undefined)cash=Number(S.ov[idx]);
    const inc=gInc(idx).reduce((t,i)=>t+i.amount,0);
    const exp=gExp(idx).reduce((t,e)=>t+e.amount,0);
    const flex=FX.flatMap(f=>f.chunks.filter(c=>S.fa[mk(mo.s,mo.y)+'-'+c.id])).reduce((t,c)=>t+c.a,0);
    const gout=S.goals.filter(g=>g.monthIdx===idx).reduce((t,g)=>t+g.amount,0);
    const jkt=(S.js&&S.jsm===idx)?Math.round((S.jp-S.jm)/IDR):0;
    cash=cash+inc-exp-flex-gout+jkt;
    const sm=mo.y>=2029?1.35:mo.y>=2028?1.2:1;
    oa+=Math.round(1840*sm);sa+=Math.round(480*sm);ma+=Math.round(640*sm)-595;
    const cor=Math.max(0,52368-544*(idx+1));
    const ezr=Math.max(0,33138-280*(idx+1));
    const ccr=idx>=4?0:Math.max(0,5779-1000*(idx+1));
    const fp=FX.flatMap(f=>f.chunks.filter(c=>{
      const k=Object.keys(S.fa).find(k=>k.endsWith('-'+c.id)&&S.fa[k]);
      if(!k)return false;
      const ms=k.slice(0,k.lastIndexOf('-'+c.id));
      const mi=MO.findIndex(m=>mk(m.s,m.y)===ms);
      return mi>=0&&mi<=idx;
    })).reduce((t,c)=>t+c.a,0);
    const fd=Math.max(0,19100-fp);
    const je=(S.js&&idx>=(S.jsm>=0?S.jsm:999))?0:Math.round((S.jp-S.jm)/IDR);
    const assets=cash+oa+sa+ma+S.gold+S.elec+je;
    const liabs=cor+ezr+ccr+fd;
    _R.push({cash:Math.round(cash),oa:Math.round(oa),sa:Math.round(sa),ma:Math.round(ma),je,assets:Math.round(assets),liabs:Math.round(liabs),nw:Math.round(assets-liabs)});
  });
  _rk=key;return _R;
}

function snw(){return Math.round(S.cpfOA+S.cpfSA+S.cpfMA+650+S.gold+S.elec+(S.jp-S.jm)/IDR-(52368+33138+5779+8100+11000));}

}

function draw(){
  const R=calc(),sn=snw();
  const mo=MO[S.sel],cur=R[S.sel];
  const prev=S.sel===0?(S.ov[0]!==undefined?Number(S.ov[0]):500):R[S.sel-1].cash;
  const ii=gInc(S.sel),ei=gExp(S.sel);

  const fo=FX.flatMap(f=>f.chunks.filter(c=>S.fa[mk(mo.s,mo.y)+'-'+c.id])).reduce((t,c)=>t+c.a,0);
  const go=S.goals.filter(g=>g.monthIdx===S.sel).reduce((t,g)=>t+g.amount,0);
  const to=ei.reduce((t,e)=>t+e.amount,0)+fo+go;
  const sur=ti-to;
  const ag=R.every(r=>r.cash>=FLOOR);
  const vis=S.yr==="all"?MO:MO.filter(m=>m.y===parseInt(S.yr));
  const mcash=Math.max(...R.map(r=>Math.abs(r.cash)),1);
  const mnw=Math.max(...R.map(r=>r.nw),1);
  const ye=[2026,2027,2028,2029].map(y=>{const i=MO.map((m,j)=>j).filter(j=>MO[j].y===y).pop();return i!=null?{y,nw:R[i].nw,cash:R[i].cash}:null;}).filter(Boolean);

  $('#hdr').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">

    <span class="tag" style="background:${ag?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)'};color:${ag?'#10b981':'#ef4444'}">${ag?"✅ On track":"⚠️ Floor breach"}</span>
  </div>`;

  $('#nav').innerHTML=[{id:"home",i:"📊",l:"Overview"},{id:"months",i:"📅",l:"Monthly"},{id:"goals",i:"🎯",l:"Goals"},{id:"settings",i:"⚙️",l:"Settings"}]

  else if(S.page==="goals") pgGoals(R);
  else pgSettings();
  pgModal(R);
}

        <div style="font-size:10px;color:#64748b">Keep at least <strong style="color:${av.color}">${fmt(buf)}</strong> after buying</div>
      </div>
      <div style="font-size:11px;margin-bottom:8px;color:#64748b">
        ${fs>=0?`✅ Safe from: <strong style="color:#10b981">${MO[fs].s} ${MO[fs].y}</strong>`:`❌ Not safely affordable in this plan`}
        ${fs<0&&fb>=0?`<br><span style="color:#f59e0b">⚠️ Technically possible ${MO[fb].s} ${MO[fb].y} but risky</span>`:''}
      </div>
      ${sch?`
        <div style="padding:9px 11px;border-radius:9px;background:${safe?'rgba(16,185,129,.08)':bare?'rgba(245,158,11,.08)':'rgba(239,68,68,.08)'};border:1px solid ${safe?'rgba(16,185,129,.25)':bare?'rgba(245,158,11,.25)':'rgba(239,68,68,.25)'}">
          <div style="font-size:11px;font-weight:700;color:${safe?'#10b981':bare?'#f59e0b':'#ef4444'}">${safe?'✅ Safe to buy':bare?'⚠️ Risky':'❌ Unsafe'} — ${MO[g.monthIdx].s} ${MO[g.monthIdx].y}</div>
          <div style="font-size:10px;color:#64748b;margin-top:2px">After: ${fmt(aft||0)}</div>
        </div>
        <button class="btn bgh bsm" style="width:100%;margin-top:8px;justify-content:center" onclick="uschGoal(${g.id})">Remove schedule</button>
      `:`
        <select style="font-size:11px" onchange="schGoal(${g.id},this.value)">
          <option value="">📅 Schedule to a month...</option>
          ${MO.map((m,i)=>`<option value="${i}">${m.s} ${m.y} — ${R[i].cash-g.amount>=buf?'✅ safe':R[i].cash-g.amount>=FLOOR?'⚠️ risky':'❌ unsafe'}</option>`).join('')}
        </select>
      `}
    </div>`;
  }).join('')}
  ${!S.goals.length?`<div class="card" style="text-align:center;padding:28px"><div style="font-size:36px;margin-bottom:8px">🎯</div><div style="color:#64748b">No goals yet.</div></div>`:''}`;
}

    <div class="li"><span style="font-size:13px;font-weight:600;flex:1">Equity (SGD)</span><span style="font-size:14px;font-weight:700;color:#10b981">${fmt(Math.round((S.jp-S.jm)/IDR))}</span></div>
    <div class="dv"></div>

// MODAL

  const root=$('#modal');
  if(!S.modal){root.innerHTML='';return;}
  const md=S.md||{};let b='';

  if(S.modal==='addExpense'||S.modal==='editExpense'){
    const isE=S.modal==='editExpense';
    if(!S.tmp)S.tmp=isE?{...S.exp.find(x=>x.id===md.id)}:{label:'',amount:200,cat:'living',icon:'📌',from:md.from||0,to:null,ed:true};
    b=`<div class="db"></div><div style="font-size:16px;font-weight:800;margin-bottom:14px">${isE?'Edit':'Add'} expense</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Name</div><input type="text" value="${S.tmp.label}" placeholder="e.g. Netflix" oninput="S.tmp.label=this.value"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Amount ($)</div><input type="number" value="${S.tmp.amount}" oninput="S.tmp.amount=parseInt(this.value)||0"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Category</div><select onchange="S.tmp.cat=this.value">${Object.entries(CAT).map(([k,v])=>`<option value="${k}" ${S.tmp.cat===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}</select></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Icon</div><input type="text" value="${S.tmp.icon}" style="width:60px" oninput="S.tmp.icon=this.value"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Starts</div><select onchange="S.tmp.from=parseInt(this.value)">${MO.map((m,i)=>`<option value="${i}" ${(S.tmp.from||0)===i?'selected':''}>${m.s} ${m.y}</option>`).join('')}</select></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Ends</div><select onchange="S.tmp.to=this.value===''?null:parseInt(this.value)"><option value="">Ongoing</option>${MO.map((m,i)=>`<option value="${i}" ${S.tmp.to===i?'selected':''}>${m.s} ${m.y}</option>`).join('')}</select></div>
      <div style="display:flex;gap:8px"><button class="btn bgh" style="flex:1;justify-content:center" onclick="closeMod()">Cancel</button><button class="btn bpri" style="flex:1;justify-content:center" onclick="saveExp(${isE})">Save</button></div>`;
  }
  if(S.modal==='addIncome'){
    if(!S.tmp)S.tmp={label:'',amount:1000,icon:'💼',from:0,to:null};

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Name</div><input type="text" value="${S.tmp.label}" placeholder="e.g. Rental" oninput="S.tmp.label=this.value"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Amount ($)</div><input type="number" value="${S.tmp.amount}" oninput="S.tmp.amount=parseInt(this.value)||0"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Icon</div><input type="text" value="${S.tmp.icon}" style="width:60px" oninput="S.tmp.icon=this.value"></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Starts</div><select onchange="S.tmp.from=parseInt(this.value)">${MO.map((m,i)=>`<option value="${i}">${m.s} ${m.y}</option>`).join('')}</select></div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><div style="font-size:12px;color:#94a3b8;min-width:100px">Ends</div><select onchange="S.tmp.to=this.value===''?null:parseInt(this.value)"><option value="">Ongoing</option>${MO.map((m,i)=>`<option value="${i}">${m.s} ${m.y}</option>`).join('')}</select></div>
      <div style="display:flex;gap:8px"><button class="btn bgh" style="flex:1;justify-content:center" onclick="closeMod()">Cancel</button><button class="btn bpri" style="flex:1;justify-content:center" onclick="saveInc()">Save</button></div>`;

    const isE=S.modal==='editGoal';
    if(!S.tmp)S.tmp=isE?{...S.goals.find(x=>x.id===md.id)}:{name:'',amount:5000,emoji:'🎯',color:'#6366f1'};
    b=`<div class="db"></div><div style="font-size:16px;font-weight:800;margin-bottom:14px">${isE?'Edit':'New'} goal</div>

// ACTIONS
function go(p){S.page=p;render();}
function selMo(i){S.sel=i;render();}
function closeMod(){S.modal=null;S.md=null;S.tmp=null;render();}
function openMod(t,d){S.modal=t;S.md=d||null;S.tmp=null;render();}

function setOv(){
  const el=$('#ov-in');if(!el)return;
  const v=parseInt(el.value);
  if(isNaN(v)){toast('Enter a valid number');return;}
  S.ov[S.sel]=v;_rk='';render();toast('✅ Balance set for '+MO[S.sel].s+' '+MO[S.sel].y);
}
function clrOv(){
  if(S.sel===0){toast("Can't clear starting month");return;}
  delete S.ov[S.sel];_rk='';render();toast('Cleared');
}

function saveExp(isE){
  if(!S.tmp.label||!S.tmp.amount){toast('Fill name and amount');return;}
  if(isE){const i=S.exp.findIndex(x=>x.id===S.md.id);if(i>=0)S.exp[i]={...S.tmp,id:S.md.id,ed:true};}
  else S.exp.push({...S.tmp,id:'e'+S.ne++,ed:true});
  _rk='';closeMod();toast('Saved ✅');
}
function updExp(id,v){const e=S.exp.find(x=>x.id===id);if(e){e.amount=v;_rk='';render();}}
function delExp(id){if(confirm('Remove?')){S.exp=S.exp.filter(e=>e.id!==id);_rk='';render();}}

function saveInc(){
  if(!S.tmp.label||!S.tmp.amount){toast('Fill name and amount');return;}
  S.inc.push({...S.tmp,id:'i'+S.ni++});_rk='';closeMod();toast('Saved ✅');
}
function updInc(id,v){const i=S.inc.find(x=>x.id===id);if(i){i.amount=v;_rk='';render();}}
function delInc(id){if(confirm('Remove?')){S.inc=S.inc.filter(i=>i.id!==id);_rk='';render();}}

function adCk(fdId,ms,my){
  const fd=FX.find(f=>f.id===fdId);
  const next=fd.chunks.find(c=>!Object.keys(S.fa).some(k=>k.endsWith('-'+c.id)&&S.fa[k]));
  if(next){S.fa[mk(ms,my)+'-'+next.id]=true;_rk='';render();}
}
function rmCk(fdId,ms,my){
  const fd=FX.find(f=>f.id===fdId);
  fd.chunks.forEach(c=>{delete S.fa[mk(ms,my)+'-'+c.id];});
  _rk='';render();
}

function saveGoal(isE){
  if(!S.tmp.name||!S.tmp.amount){toast('Fill name and amount');return;}
  if(isE){const i=S.goals.findIndex(x=>x.id===S.md.id);if(i>=0)S.goals[i]={...S.goals[i],...S.tmp};}
  else S.goals.push({...S.tmp,id:S.ng++,monthIdx:null,color:S.tmp.color||'#6366f1'});
  closeMod();toast('Saved ✅');
}
function rmGoal(id){if(confirm('Remove?')){S.goals=S.goals.filter(g=>g.id!==id);render();}}
function schGoal(id,v){if(!v)return;const g=S.goals.find(g=>g.id===id);if(g){g.monthIdx=parseInt(v);_rk='';render();}}
function uschGoal(id){const g=S.goals.find(g=>g.id===id);if(g){g.monthIdx=null;render();}}

function chkAff(val){
  const amt=parseInt(val)||0,el=$('#aff-out');if(!el)return;
  if(!amt){el.innerHTML='<span style="color:#64748b">Enter any amount.</span>';return;}
  const R=calc(),buf=sbuf(amt),av=gadv(amt);
  const idx=R.findIndex(r=>r.cash-amt>=buf);
  const bare=R.findIndex(r=>r.cash-amt>=FLOOR);
  let h=`<div style="background:#1a2235;border-radius:10px;padding:11px;border-left:3px solid ${av.color}"><div style="font-size:12px;font-weight:700;color:${av.color};margin-bottom:3px">${av.icon} ${av.tier} — ${fmt(amt)}</div><div style="font-size:11px;color:#94a3b8;margin-bottom:5px">${av.tip}</div><div style="font-size:11px;color:#64748b;margin-bottom:7px">Keep at least <strong style="color:${av.color}">${fmt(buf)}</strong> after buying</div>`;
  if(idx>=0)h+=`<div style="font-size:13px;font-weight:700;color:#10b981">✅ Safe from: ${MO[idx].s} ${MO[idx].y}</div><div style="font-size:11px;color:#64748b;margin-top:2px">Savings after: ${fmt(R[idx].cash-amt)}</div>`;
  else{h+=`<div style="font-size:13px;font-weight:700;color:#ef4444">❌ Not safely affordable 2026–2029</div>`;if(bare>=0)h+=`<div style="font-size:11px;color:#f59e0b;margin-top:3px">⚠️ Technically possible ${MO[bare].s} ${MO[bare].y} but risky</div>`;}
  el.innerHTML=h+'</div>';
}

function expData(){
  const b=new Blob([localStorage.getItem(SK)||'{}'],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='cherwin-finance-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('📤 Downloaded');
}
function impData(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{localStorage.setItem(SK,e.target.result);toast('📥 Imported — reloading...');setTimeout(()=>location.reload(),1000);}catch{toast('❌ Invalid file');}};
  r.readAsText(f);
}
function resetAll(){localStorage.removeItem(SK);location.reload();}

// INIT
load();render();
</script>
